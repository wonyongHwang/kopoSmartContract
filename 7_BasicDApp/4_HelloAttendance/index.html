<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>출석 체크 DApp</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="card-title text-center mb-4">
          출석 체크 DApp
        </h1>

        <p class="text-muted text-center">
          MetaMask 지갑을 연결하고 블록체인에 출석 정보를 기록합니다.
        </p>

        <div class="d-grid gap-2 col-md-6 mx-auto my-4">
          <button class="btn btn-primary" onclick="connectWallet()">
            MetaMask 연결
          </button>

          <button class="btn btn-success" onclick="checkIn()">
            출석하기
          </button>

          <button class="btn btn-outline-secondary" onclick="checkStatus()">
            출석 여부 확인
          </button>
        </div>

        <div class="alert alert-info mt-4" role="alert">
          <strong>지갑 상태:</strong>
          <span id="account">지갑 연결 전</span>
        </div>

        <div class="alert alert-light border" role="alert">
          <strong>처리 결과:</strong>
          <span id="result">아직 실행된 작업이 없습니다.</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ethers.js -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <script>
    let provider;
    let signer;
    let contract;

    const contractAddress = "0xB004708eee2303B5D5459070797a4c9BBACcb7A9";

    // const contractAddress = "여기에_배포한_컨트랙트_주소_입력";

    const abi = [
      "function checkIn() public",
      "function isCheckedIn(address user) public view returns (bool)",
      "function getCheckInTime(address user) public view returns (uint256)"
    ];

    async function connectWallet() {
      if (typeof window.ethereum === "undefined") {
        alert("MetaMask가 설치되어 있지 않습니다.");
        return;
      }

      provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);

      signer = provider.getSigner();

      const account = await signer.getAddress();

      document.getElementById("account").innerText = account;

      contract = new ethers.Contract(contractAddress, abi, signer);

      document.getElementById("result").innerText =
        "MetaMask 연결이 완료되었습니다.";
    }

    async function checkIn() {
      if (!contract) {
        alert("먼저 MetaMask를 연결하세요.");
        return;
      }

      try {
        const tx = await contract.checkIn();

        document.getElementById("result").innerText =
          "출석 트랜잭션 처리 중입니다. MetaMask와 블록 확인을 기다려주세요.";

        await tx.wait();

        document.getElementById("result").innerText =
          "출석이 완료되었습니다.";
      } catch (error) {
        document.getElementById("result").innerText =
          "출석 실패: " + error.message;
      }
    }

    async function checkStatus() {
      if (!contract) {
        alert("먼저 MetaMask를 연결하세요.");
        return;
      }

      const account = await signer.getAddress();
      const status = await contract.isCheckedIn(account);

      if (status) {
        const time = await contract.getCheckInTime(account);
        const date = new Date(time.toNumber() * 1000);

        document.getElementById("result").innerText =
          "출석 완료 시간: " + date.toLocaleString();
      } else {
        document.getElementById("result").innerText =
          "아직 출석하지 않았습니다.";
      }
    }
  </script>
</body>
</html>
